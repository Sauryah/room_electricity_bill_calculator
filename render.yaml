# Render Blueprint for the Room Bill Splitter backend.
# Deploy: push the repo to GitHub, then "New Blueprint" on Render and pick this file.
services:
  - type: web
    name: room-bill-splitter-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        sync: false  # set this in the Render dashboard (Supabase Postgres URL)
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_MINUTES
        value: "1440"
      - key: ADMIN_USERNAME
        value: "admin"
      - key: ADMIN_PASSWORD
        sync: false  # set this in the Render dashboard
      - key: CORS_ORIGINS
        value: "*"
